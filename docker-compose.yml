version: '3.8'

services:
  dashboard:
    build: .
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      - PYTHONPATH=/app
      - OPENCLAW_CONFIG_DIR=/app
      - OPENCLAW_LOG_DIR=/app/logs
    volumes:
      - ./brain:/app/brain
      - ./logs:/app/logs
      - ./.docker-secrets:/run/local-secrets:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 60s
      timeout: 10s
      retries: 3

  btc-agent:
    build: .
    command: ["bash", "-c", "while true; do python btc/btc_trading_agent.py; sleep 600; done"]
    env_file: .env
    environment:
      - PYTHONPATH=/app
      - OPENCLAW_CONFIG_DIR=/app
      - OPENCLAW_LOG_DIR=/app/logs
    volumes:
      - ./brain:/app/brain
      - ./logs:/app/logs
      - ./.docker-secrets:/run/local-secrets:ro
    restart: unless-stopped
    depends_on:
      dashboard:
        condition: service_healthy

  kr-agent:
    build: .
    command: ["bash", "-c", "while true; do python stocks/stock_trading_agent.py; sleep 600; done"]
    env_file: .env
    environment:
      - PYTHONPATH=/app
      - OPENCLAW_CONFIG_DIR=/app
      - OPENCLAW_LOG_DIR=/app/logs
    volumes:
      - ./brain:/app/brain
      - ./logs:/app/logs
      - ./.docker-secrets:/run/local-secrets:ro
    restart: unless-stopped
    depends_on:
      dashboard:
        condition: service_healthy

  us-agent:
    build: .
    command: ["bash", "-c", "while true; do python stocks/us_stock_trading_agent.py; sleep 900; done"]
    env_file: .env
    environment:
      - PYTHONPATH=/app
      - OPENCLAW_CONFIG_DIR=/app
      - OPENCLAW_LOG_DIR=/app/logs
    volumes:
      - ./brain:/app/brain
      - ./logs:/app/logs
      - ./.docker-secrets:/run/local-secrets:ro
    restart: unless-stopped
    depends_on:
      dashboard:
        condition: service_healthy

  telegram-bot:
    build: .
    command: ["python", "stocks/telegram_bot.py"]
    user: "1000:1000"
    env_file: .env
    environment:
      - PYTHONPATH=/app
      - OPENCLAW_CONFIG_DIR=/app
      - OPENCLAW_LOG_DIR=/app/logs
    volumes:
      - ./brain:/app/brain
      - ./logs:/app/logs
      - ./.docker-secrets:/run/local-secrets:ro
    restart: unless-stopped
    depends_on:
      dashboard:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:?GRAFANA_PASSWORD must be set}
    restart: unless-stopped
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data:
